server {
    listen 80;
    server_name mystic.sonoradigitalcorp.com;

    root /var/www/mistic-landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /modulos/ {
        auth_basic "Acceso privado Mystic";
        auth_basic_user_file /etc/nginx/.mystic_htpasswd;
        try_files $uri $uri/ =404;
    }
}
